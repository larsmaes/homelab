---
apiVersion: v1
kind: Namespace
metadata:
  name: descheduler
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: descheduler
  namespace: descheduler
spec:
    interval: 24h
    url: https://kubernetes-sigs.github.io/descheduler
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: descheduler
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: descheduler
        namespace: descheduler
      interval: 12h